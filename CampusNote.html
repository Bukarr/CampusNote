<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar Toggle Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="manifest" href="/manifest.json" />
  <style>
    #wrapper {
      display: flex;
      position: relative;
    }
    #scanImageInput{
      width: 70vw;
      border: 1px solid #929292;
      border-radius: 5px;
      padding: 5px;
    }

    /* Sidebar hidden by default */
    #sidebar-wrapper {
      position: fixed;
      top: 70px;
      left: -250px;
      width: 250px;
      height: calc(100vh - 66px);
      background-color: #34495e;
      transition: left 0.3s ease;
      z-index: 1050;
    }

    /* Sidebar visible when toggled */
    #wrapper.toggled #sidebar-wrapper {
      left: 0;
    }
    .content-section {
  display: none;
}
.content-section.active {
  display: block;
}
#topNav {
  background-color: #34495e;
}
.list-group-item{
    background-color: #34495e;
    border: none;
}
.list-group-item:hover {
    background-color: #2c3e50;
    color: white;
    cursor: pointer;
}
#menu-toggle{
    background-color: #34495e;
    border: none;
    color: white;
}
  </style>
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top" id="topNav">
    <div class="container-fluid">
      <button class="btn btn-dark" type="button" id="menu-toggle">
        <i class="bi bi-list fs-4"></i>
      </button>
      <a class="navbar-brand mx-auto text-white" href="CampusNote.html"> CampusNote 📘 </a>
    </div>
  </nav>

  <!-- Wrapper -->
  <div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="" id="sidebar-wrapper">
      <div class="list-group list-group-flush">
        <button class="list-group-item list-group-item-action  text-white" data-section="new-note-section">📝 New Note</button>
        <button class="list-group-item list-group-item-action  text-white" data-section="notes-section">📒 Notes</button>
        <button class="list-group-item list-group-item-action  text-white" data-section="export-section">📤 Export</button>
        <button class="list-group-item list-group-item-action  text-white" data-section="import-section">📥 Import</button>
        <button class="list-group-item list-group-item-action  text-white" id="toggle-theme-btn">🌙 Toggle Theme</button>
      </div>
    </div>
  </div>

  <div id="page-content-wrapper" class="flex-grow-1">
      <div class="container-fluid py-4">
        <div id="main-content">
          <!-- New Note Section -->
          <div id="new-note-section" class="content-section active">
            <h4>Create a New Note</h4>
            <div class="mb-3">
              <select id="folderSelect" class="form-select">
                <option value="">All Folders</option>
              </select>
              <div class="input-group mt-2">
                <input type="text" id="newFolderInput" class="form-control" placeholder="Create new folder" />
                <button class="btn btn-outline-primary" onclick="createFolderBtn()">Add Folder</button>
              </div>
            </div>
            <div class="mb-3">
              <textarea id="noteInput" class="form-control" rows="10" placeholder="Write your masterpiece..."></textarea>
              <input type="text" id="tagInput" class="form-control mt-2" placeholder="Tags (comma separated)" />
              <input type="date" id="dateInput" class="form-control mt-2" />
            </div>
            <div class="d-flex gap-2 flex-wrap justify-content-center align-items-center">
              <button class="btn btn-success" onclick="saveNote()"><i class="bi bi-save"></i> Save</button>
              <button class="btn btn-primary text-white" onclick="startVoiceNote()"><i class="bi bi-mic-fill"></i> Voice</button>
              <input type="file" id="scanImageInput" accept="image/*">
              <button class="btn btn-warning" onclick="scanImageToText('scanImageInput')"><i class="bi bi-image"></i> Scan</button>
            </div>
          </div>

          <!-- Notes Section -->
          <div id="notes-section" class="content-section">
            <h4>My Notes</h4>
            <input type="text" id="searchInput" class="form-control mb-3" placeholder="Search notes..." oninput="searchNotes()" />
            <div id="notesContainer"></div>
          </div>

          <!-- Export Section -->
          <div id="export-section" class="content-section">
            <h4>Export Notes</h4>
            <div id="exportList" class="mb-3"></div>
            <select id="exportFormat" class="form-select mb-2">
              <option value="txt">TXT</option>
              <option value="pdf">PDF</option>
              <option value="docx">DOCX</option>
            </select>
            <button class="btn btn-success" onclick="exportSelected()">Export Selected</button>
          </div>

          <!-- Import Section -->
          <div id="import-section" class="content-section">
            <h4>Import Notes</h4>
            <div id="importList" class="mb-3"></div>
            <input type="file" id="importInput" class="form-control mb-2" accept=".txt,.docx,.pdf" onchange="handleImport(this)" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('wrapper');
    const menuToggle = document.getElementById('menu-toggle');
    const sidebar = document.getElementById('sidebar-wrapper');

    // Toggle sidebar on menu button click
    menuToggle.addEventListener('click', (e) => {
      e.stopPropagation(); // prevent click bubbling
      wrapper.classList.toggle('toggled');
    });

    // Hide sidebar when clicking on a sidebar button
    document.querySelectorAll('[data-section]').forEach(btn => {
      btn.addEventListener('click', () => {
        wrapper.classList.remove('toggled');
      });
    });

    // Hide sidebar when clicking outside
    document.addEventListener('click', (e) => {
      if (wrapper.classList.contains('toggled')) {
        if (!sidebar.contains(e.target) && e.target !== menuToggle && !menuToggle.contains(e.target)) {
          wrapper.classList.remove('toggled');
        }
      }
    });
  </script>
 <!-- Add these scripts to your <head> or before </body> -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.2/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.2.4/build/index.js"></script>

<script>
/* ---------------------------
   Global Data & State
---------------------------- */
let notes = JSON.parse(localStorage.getItem("notes")) || [];
let folders = JSON.parse(localStorage.getItem("folders")) || ["General"];
let editingNoteId = null;

/* ---------------------------
   Navigation Handling
---------------------------- */
document.querySelectorAll("[data-section]").forEach(btn => {
  btn.addEventListener("click", () => {
    let target = btn.getAttribute("data-section");
    document.querySelectorAll(".content-section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(target).classList.add("active");

    if (target === "export-section") renderExportList();
    if (target === "import-section") renderImportList();
  });
});

/* ---------------------------
   Folder Management
---------------------------- */
function renderFolders() {
  let folderSelect = document.getElementById("folderSelect");
  folderSelect.innerHTML = `<option value="">All Folders</option>`;
  folders.forEach(f => {
    let opt = document.createElement("option");
    opt.value = f;
    opt.textContent = f;
    folderSelect.appendChild(opt);
  });
}
function createFolderBtn() {
  let input = document.getElementById("newFolderInput");
  let val = input.value.trim();
  if (val && !folders.includes(val)) {
    folders.push(val);
    localStorage.setItem("folders", JSON.stringify(folders));
    renderFolders();
    input.value = "";
  }
}
renderFolders();

/* ---------------------------
   Save Note (New or Edit)
---------------------------- */
function saveNote() {
  let folder = document.getElementById("folderSelect").value || "General";
  let text = document.getElementById("noteInput").value.trim();
  let tags = document.getElementById("tagInput").value.split(",").map(t => t.trim()).filter(Boolean);
  let date = document.getElementById("dateInput").value || new Date().toISOString().split("T")[0];

  if (!text) return alert("Please write something before saving.");

  if (editingNoteId) {
    // Update existing note
    notes = notes.map(n => n.id === editingNoteId ? {...n, text, tags, folder, date} : n);
    editingNoteId = null;
    alert("Note updated!");
  } else {
    // Create new note
    let note = { id: Date.now(), folder, text, tags, date };
    notes.push(note);
    alert("Note saved!");
  }

  localStorage.setItem("notes", JSON.stringify(notes));
  renderNotes();
  renderExportList();
  document.getElementById("noteInput").value = "";
  document.getElementById("tagInput").value = "";
}

/* ---------------------------
   Render Notes
---------------------------- */
function renderNotes(filter = "") {
  let container = document.getElementById("notesContainer");
  container.innerHTML = "";
  let filtered = notes.filter(n => 
    n.text.toLowerCase().includes(filter.toLowerCase()) || 
    (n.tags && n.tags.join(",").toLowerCase().includes(filter.toLowerCase()))
  );
  filtered.forEach(n => {
    let card = document.createElement("div");
    card.className = "card mb-2";
    card.innerHTML = `
      <div class="card-body">
        <h6 class="card-subtitle mb-1"><b>${n.folder}</b> | ${n.date}</h6>
        <p class="card-text">${n.text}</p>
        <small class="text-muted">Tags: ${n.tags.join(", ")}</small>
        <div class="mt-2">
          <button class="btn btn-sm btn-primary" onclick="editNote(${n.id})">Edit</button>
          <button class="btn btn-sm btn-danger" onclick="deleteNote(${n.id})">Delete</button>
        </div>
      </div>`;
    container.appendChild(card);
  });
}
function searchNotes() {
  let query = document.getElementById("searchInput").value;
  renderNotes(query);
}
function deleteNote(id) {
  if (confirm("Are you sure you want to delete this note?")) {
    notes = notes.filter(n => n.id !== id);
    localStorage.setItem("notes", JSON.stringify(notes));
    renderNotes();
    renderExportList();
  }
}
function editNote(id) {
  let note = notes.find(n => n.id === id);
  if (!note) return;
  editingNoteId = id;
  document.getElementById("noteInput").value = note.text;
  document.getElementById("tagInput").value = note.tags.join(", ");
  document.getElementById("folderSelect").value = note.folder;
  document.getElementById("dateInput").value = note.date;
  // Jump to new note section
  document.querySelectorAll(".content-section").forEach(sec => sec.classList.remove("active"));
  document.getElementById("new-note-section").classList.add("active");
}
renderNotes();

/* ---------------------------
   Export Notes
---------------------------- */
function renderExportList() {
  let exportList = document.getElementById("exportList");
  exportList.innerHTML = notes.map(n => `
    <div>
      <input type="checkbox" value="${n.id}" class="export-check"/> 
      <b>${n.folder}</b> (${n.date}) - ${n.text.substring(0,40)}...
    </div>
  `).join("");
}
/* ---------------------------
   Export Notes (with formatted PDF)
---------------------------- */
function exportSelected() {
  let ids = Array.from(document.querySelectorAll(".export-check:checked")).map(c => +c.value);
  let selectedNotes = notes.filter(n => ids.includes(n.id));
  if (!selectedNotes.length) return alert("Select at least one note.");

  let format = document.getElementById("exportFormat").value;

  if (format === "txt") {
    let content = selectedNotes.map(n =>
      `📌 ${n.folder} (${n.date})\n${n.text}\nTags: ${n.tags.join(", ")}`
    ).join("\n\n-----------------------------\n\n");
    let blob = new Blob([content], {type: "text/plain;charset=utf-8"});
    saveAs(blob, "notes.txt");
  }

  if (format === "pdf") {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // Page & text settings
    const pageWidth = doc.internal.pageSize.width;
    const pageHeight = doc.internal.pageSize.height;
    const margin = 20;  // uniform margin (left, right, top, bottom)
    const lineHeight = 7;
    const titleFontSize = 20;
    const noteHeadingFontSize = 14;
    const bodyFontSize = 12;
    const footerFontSize = 10;
    const usableWidth = pageWidth - margin * 2;
    const maxLinesPerPage = Math.floor((pageHeight - margin * 2 - 30) / lineHeight);

    let lineCount = 0;
    let pageNumber = 1;

    // Apply font globally
    doc.setFont("helvetica", "normal");

    // Add footer
    function addFooter() {
      doc.setFontSize(footerFontSize);
      doc.text(`Page ${pageNumber}`, pageWidth / 2, pageHeight - 10, { align: "center" });
    }

    // Add page title
    function addTitle() {
      doc.setFontSize(titleFontSize);
      doc.setFont("helvetica", "bold");
      doc.text("Exported Notes", pageWidth / 2, margin, { align: "center" });
      doc.setFont("helvetica", "normal");
      doc.setFontSize(bodyFontSize);
    }

    // First page title
    addTitle();
    let y = margin + 15;

    // Loop notes
    selectedNotes.forEach((n, idx) => {
      // Add note heading
      let heading = `📌 ${n.folder} (${n.date})`;
      let headingLines = doc.splitTextToSize(heading, usableWidth);

      // Page break if needed before heading
      if (lineCount + headingLines.length >= maxLinesPerPage) {
        addFooter();
        doc.addPage();
        pageNumber++;
        addTitle();
        y = margin + 15;
        lineCount = 0;
      }

      // Heading
      doc.setFont("helvetica", "bold");
      doc.setFontSize(noteHeadingFontSize);
      headingLines.forEach(line => {
        doc.text(line, margin, y);
        y += lineHeight;
        lineCount++;
      });

      // Note body
      let body = `${n.text}\n\nTags: ${n.tags.join(", ")}`;
      let bodyLines = doc.splitTextToSize(body, usableWidth);

      doc.setFont("helvetica", "normal");
      doc.setFontSize(bodyFontSize);

      bodyLines.forEach(line => {
        if (lineCount >= maxLinesPerPage) {
          addFooter();
          doc.addPage();
          pageNumber++;
          addTitle();
          y = margin + 15;
          lineCount = 0;
        }
        doc.text(line, margin, y);
        y += lineHeight;
        lineCount++;
      });

      // Extra spacing between notes
      y += lineHeight;
      lineCount++;
    });

    addFooter(); // last page footer
    doc.save("notes.pdf");
  }

  if (format === "docx") {
    const docxDoc = new docx.Document({
      sections: [{
        properties: {},
        children: selectedNotes.map(n =>
          new docx.Paragraph({
            text: `📌 ${n.folder} (${n.date})\n${n.text}\nTags: ${n.tags.join(", ")}`,
            spacing: { after: 200 }
          })
        )
      }]
    });
    docx.Packer.toBlob(docxDoc).then(blob => saveAs(blob, "notes.docx"));
  }
}

/* ---------------------------
   Import Notes
---------------------------- */
function handleImport(input) {
  let file = input.files[0];
  if (!file) return;
  let reader = new FileReader();
  reader.onload = (e) => {
    let text = e.target.result;
    document.getElementById("noteInput").value = text;
    document.getElementById("folderSelect").value = "Imported";
    document.getElementById("dateInput").value = new Date().toISOString().split("T")[0];
    // Jump to new note section for review
    document.querySelectorAll(".content-section").forEach(sec => sec.classList.remove("active"));
    document.getElementById("new-note-section").classList.add("active");
  };
  reader.readAsText(file);
}
function renderImportList() {
  let container = document.getElementById("importList");
  container.innerHTML = notes
    .filter(n => n.folder === "Imported")
    .map(n => `<div><b>${n.date}</b> - ${n.text.substring(0,40)}...</div>`)
    .join("");
}
</script>

<script>
/* ---------------------------
   Voice-to-Text (VN Button)
---------------------------- */
function startVoiceNote() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert("Speech Recognition is not supported in this browser.");
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.start();

  recognition.onresult = function(event) {
    const transcript = event.results[0][0].transcript;
    let noteField = document.getElementById("noteInput");
    noteField.value += (noteField.value ? "\n" : "") + transcript;
  };

  recognition.onerror = function(event) {
    alert("Voice recognition error: " + event.error);
  };
}

/* ---------------------------
   Image-to-Text (Scan Button)
---------------------------- */
function scanImageToText(fileInputId) {
  let fileInput = document.getElementById(fileInputId);
  let file = fileInput.files[0];
  if (!file) {
    alert("Please select an image first.");
    return;
  }

  Tesseract.recognize(
    file,
    'eng',
    { logger: m => console.log(m) }
  ).then(({ data: { text } }) => {
    let noteField = document.getElementById("noteInput");
    noteField.value += (noteField.value ? "\n" : "") + text.trim();
  }).catch(err => {
    console.error(err);
    alert("Error scanning image.");
  });
}
</script>
</body>
</html>
