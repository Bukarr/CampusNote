<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vaultlify Login</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      justify-content: center;
      align-items: center;
      background: #f0f2f5;
    }
    .login-container {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 300px;
    }
    input {
      width: 93%;
      padding: 0.5rem;
      margin: 1rem 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      width: 100%;
      padding: 0.5rem;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
  </style>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5YWF0N6E98"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5YWF0N6E98');
</script>
</head>
<body>
  
  <div class="login-container">
    <h2 style="text-align: center;">CampusNote Login</h2>
    <input type="text" id="userId" placeholder="User ID" />
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
  </div>

  <script>
    function login() {
      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!userId || !password) {
        alert('Please enter both User ID and Password');
        return;
      }

      const storedUserId = localStorage.getItem('vaultUserId');
      const storedPassword = localStorage.getItem('vaultPassword');

      if (!storedUserId || !storedPassword) {
        // First-time login: store credentials
        localStorage.setItem('vaultUserId', userId);
        localStorage.setItem('vaultPassword', password);
        alert('Account created successfully!');
        window.location.href = 'CampusNote.html';
      } else {
        // Validate credentials
        if (userId === storedUserId && password === storedPassword) {
          window.location.href = 'CampusNote.html';
        } else {
          alert('Incorrect User ID or Password');
        }
      }
    }
  </script>
</body>
</html>
